<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台</title>
<style>
*{box-sizing:border-box;font-family:system-ui}
body{max-width:400px;margin:30px auto;padding:0 20px}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
button{padding:10px;width:100%;background:#007AFF;color:white;border:none;border-radius:8px;margin:6px 0}
.item{background:white;padding:12px;border-radius:8px;margin:6px 0}
.del{background:#ff3b30}
</style>
</head>
<body>
<h2>后台管理</h2>

<input id="name" placeholder="名称">
<input id="url" placeholder="链接">
<input id="img" placeholder="图标链接">

<button onclick="save()">保存并立即显示</button>
<div id="items"></div>

<script>
let data = JSON.parse(localStorage.getItem('navData') || '[]');
render();

function render(){
  let dom = document.getElementById('items');
  dom.innerHTML = '';
  data.forEach((item,i)=>{
    let div = document.createElement('div');
    div.className='item';
    div.innerHTML = `<strong>${item.name}</strong><br><button class="del" onclick="del(${i})">删除</button>`;
    dom.appendChild(div);
  });
}

function save(){
  let name = document.getElementById('name').value;
  let url  = document.getElementById('url').value;
  let img  = document.getElementById('img').value;
  if(!name||!url||!img) return alert('请填完整');
  data.push({name,url,img});
  localStorage.setItem('navData',JSON.stringify(data));
  render();
  alert('保存成功！前台刷新就显示！');
}

function del(i){
  data.splice(i,1);
  localStorage.setItem('navData',JSON.stringify(data));
  render();
}
</script>
</body>
</html>
