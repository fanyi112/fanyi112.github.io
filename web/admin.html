<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{box-sizing:border-box;font-family:system-ui}
body{max-width:400px;margin:30px auto;padding:0 20px}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
button{padding:10px;width:100%;background:#007AFF;color:white;border:none;border-radius:8px;margin:6px 0}
.item{background:white;padding:12px;border-radius:8px;margin:6px 0}
.del{background:#ff3b30}
</style>
</head>
<body>
<h2>后台管理</h2>
<input id="name" placeholder="名称">
<input id="url" placeholder="链接">
<input id="img" placeholder="图标链接">
<button onclick="save()">保存并更新所有人可见的内容</button>
<div id="items"></div>

<script>
let cards = [];
// 加载当前数据
fetch('https://raw.githubusercontent.com/fanyi112/fanyi112.github.io/main/网络/data.json')
  .then(res => res.json())
  .then(data => {
    cards = data;
    render();
  });

function render(){
  const items = document.getElementById('items');
  items.innerHTML = '';
  cards.forEach((c,i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<strong>${c.name}</strong><br><button class="del" onclick="del(${i})">删除</button>`;
    items.appendChild(div);
  });
}

function save(){
  const name = document.getElementById('name').value;
  const url = document.getElementById('url').value;
  const img = document.getElementById('img').value;
  if(!name||!url||!img) return alert('请填完整');
  cards.push({name,url,img});
  // 这里需要你手动去 GitHub 更新 data.json（因为不能直接写文件）
  alert('复制下面这段数据，去 GitHub 的 data.json 里粘贴提交，所有人就看到了！\n\n' + JSON.stringify(cards, null, 2));
}

function del(i){
  cards.splice(i,1);
  alert('复制下面这段数据，去 GitHub 的 data.json 里粘贴提交，所有人就看到了！\n\n' + JSON.stringify(cards, null, 2));
}
</script>
</body>
</html>
