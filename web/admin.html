<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{box-sizing:border-box;font-family:system-ui}
body{max-width:400px;margin:30px auto;padding:0 20px}
h1{text-align:center;font-size:20px}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
button{padding:10px;width:100%;background:#007bff;color:white;border:none;border-radius:8px;margin:6px 0}
.item{background:white;padding:12px;border-radius:8px;margin:6px 0;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
.item button{padding:5px 8px;font-size:12px;width:auto}
.del{background:red}
.lock{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:grid;place-items:center}
</style>
</head>
<body>

<div class="lock" id="lock">
  <div style="text-align:center">
    <h2>输入密码</h2>
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="unlock()">解锁</button>
  </div>
</div>

<div id="admin" style="display:none">
  <h1>后台管理</h1>
  
  <input id="name" placeholder="名称">
  <input id="desc" placeholder="描述">
  <input id="url" placeholder="链接">
  
  <input type="file" id="iconUpload" accept="image/*">
  <button onclick="uploadIcon()">上传图标（大图也可以）</button>
  <input id="img" placeholder="自动生成的图标链接">

  <button onclick="save()">保存</button>
  <div id="items"></div>

  <button onclick="copyData()" style="background:#28a745">一键复制数据到GitHub</button>
</div>

<script>
const PASS = "12200912";
function unlock(){
  if(document.getElementById("pwd").value===PASS){
    document.getElementById("lock").style.display="none";
    document.getElementById("admin").style.display="block";
    load();
  }else{
    alert("密码错误");
  }
}

let cards = [];

async function load(){
  let res=await fetch("./data.json?"+Math.random());
  cards=await res.json().catch(()=>[]);
  renderList();
}

function renderList(){
  const items=document.getElementById("items");
  items.innerHTML="";
  cards.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <strong>${c.name}</strong><br>
      <small>${c.desc}</small><br>
      <button onclick="del(${i})">删除</button>
    `;
    items.appendChild(div);
  })
}

// 支持大图、压缩后上传，永远不报错
async function uploadIcon() {
  const fileInput = document.getElementById("iconUpload");
  if (!fileInput.files || fileInput.files.length === 0) {
    alert("请先选择图片！");
    return;
  }

  const file = fileInput.files[0];

  // 大图自动压缩，不限制大小
  const canvas = document.createElement("canvas");
  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = function () {
    const maxW = 512, maxH = 512;
    let w = img.width, h = img.height;
    if (w > h) {
      if (w > maxW) { h = h * maxW / w; w = maxW; }
    } else {
      if (h > maxH) { w = w * maxH / h; h = maxH; }
    }
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);

    canvas.toBlob(async (blob) => {
      const formData = new FormData();
      formData.append("file", blob);

      try {
        const r = await fetch("https://telegra.ph/upload", { method: "POST", body: formData });
        const data = await r.json();
        if (data && data[0] && data[0].src) {
          document.getElementById("img").value = "https://telegra.ph" + data[0].src;
          alert("上传成功！大图已自动压缩");
        } else {
          alert("上传失败，请重试");
        }
      } catch (e) {
        alert("上传出错");
      }
    }, "image/jpeg", 0.85);
  };
}

function save(){
  const name=document.getElementById("name").value;
  const desc=document.getElementById("desc").value;
  const url=document.getElementById("url").value;
  const img=document.getElementById("img").value;
  if(!name||!desc||!url||!img){alert("请填写完整");return}
  cards.push({name,desc,url,img});
  alert("添加成功！点一键复制同步到网站");
  renderList();
}

function copyData() {
  navigator.clipboard.writeText(JSON.stringify(cards, null, 2)).then(()=>{
    alert("复制成功！去GitHub粘贴到data.json即可");
  });
}

function del(i){
  cards.splice(i,1);
  alert("删除成功！同步一下即可");
  renderList();
}
</script>
</body>
</html>
