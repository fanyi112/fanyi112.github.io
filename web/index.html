<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f4f4f4;padding:20px}
.box{max-width:600px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.item{background:white;padding:15px;border-radius:12px;text-align:center}
.item img{width:50px;height:50px;border-radius:8px;margin-bottom:8px}
.item h3{font-size:14px;margin-bottom:5px}
.item a{font-size:12px;color:#007AFF;text-decoration:none}
</style>
</head>
<body>
<div class="box" id="list"></div>

<script>
function load(){
  let list = document.getElementById('list');
  list.innerHTML = '';
  let data = JSON.parse(localStorage.getItem('navData') || '[]');
  data.forEach(item => {
    let div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <img src="${item.img}">
      <h3>${item.name}</h3>
      <a href="${item.url}" target="_blank">打开</a>
    `;
    list.appendChild(div);
  });
}
load();
</script>
</body>
</html>
