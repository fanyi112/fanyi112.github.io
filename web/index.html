<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacFont,"Segoe UI",Roboto,sans-serif}
body{background:#fff;padding:20px}
.top-banner{background:linear-gradient(135deg,#6a11cb 0%,#ff4b2b 100%);color:#fff;padding:30px 20px;border-radius:16px;text-align:center;margin-bottom:20px}
.top-banner .sub-title{font-size:18px;margin-bottom:10px;opacity:.9}
.top-banner .main-title{font-size:28px;margin-bottom:15px;display:flex;align-items:center;gap:10px;justify-content:center}
.top-banner .action-btn{background:rgba(0,0,0,.25);color:#fff;padding:12px 35px;border-radius:30px;text-decoration:none;font-size:18px;display:inline-block}
.voice-tip{background:#f1f3f6;padding:12px 16px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:16px;color:#333}
.tab-bar{display:flex;background:#f8f9fa;border-radius:12px;padding:8px;margin-bottom:20px}
.tab-item{flex:1;text-align:center;padding:10px;border-radius:8px;font-size:16px;color:#666;cursor:pointer}
.tab-item.active{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff}
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:0 10px 20px}
.grid-item{text-align:center}
.grid-item img{width:70px;height:70px;border-radius:16px;background:#fff;margin-bottom:8px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid-item span{font-size:14px;color:#333;display:block}
.module-title{font-size:20px;font-weight:600;color:#333;margin:25px 0 15px}
.func-card{background:linear-gradient(135deg,#ff416c 0%,#6a11cb 100%);color:#fff;padding:20px;border-radius:16px;display:flex;align-items:center;gap:15px;margin-bottom:15px}
.func-card .icon{font-size:30px}
.func-card .text{flex:1}
.func-card .text h3{font-size:18px;margin-bottom:5px}
.func-card .text p{font-size:14px;opacity:.9}
.func-card .arrow{font-size:20px}
</style>
</head>
