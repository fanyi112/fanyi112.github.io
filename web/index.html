<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f4f4f4;padding:20px;text-align:center}
.item{display:inline-block;width:120px;margin:10px;background:white;padding:15px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.item img{width:60px;height:60px;border-radius:8px;margin-bottom:8px}
.item h3{font-size:14px;margin-bottom:5px}
.item a{font-size:12px;color:#007AFF;text-decoration:none}
</style>
</head>
<body>
<div id="container"></div>

<script>
// 从 GitHub 公开的 data.json 加载数据
fetch('https://raw.githubusercontent.com/fanyi112/fanyi112.github.io/main/网络/data.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('container');
    data.forEach(item => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <a href="${item.url}" target="_blank">打开</a>
      `;
      container.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById('container').innerHTML = '<p>加载中...</p>';
  });
</script>
</body>
</html>
