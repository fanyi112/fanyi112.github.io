<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航网站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f5f5f5;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;margin-bottom:30px;color:#333}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px}
.card{background:white;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card img{width:64px;height:64px;border-radius:8px;margin-bottom:10px}
.card h3{font-size:16px;margin-bottom:5px;color:#333}
.card p{font-size:12px;color:#666;margin-bottom:10px}
.card a{display:inline-block;padding:6px 12px;background:#007bff;color:white;border-radius:6px;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <h1>导航网站</h1>
  <div class="grid" id="cardGrid"></div>
</div>

<script>
async function loadCards(){
  const grid = document.getElementById("cardGrid");
  try {
    const res = await fetch("https://api.github.com/gists/d4a1b2c3e4f5a6b7c8d9e0f1a2b3c4d5");
    const data = await res.json();
    const cards = JSON.parse(data.files["data.json"].content);
    
    cards.forEach(card => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <img src="${card.img}" alt="${card.name}">
        <h3>${card.name}</h3>
        <p>${card.desc}</p>
        <a href="${card.url}" target="_blank">进入</a>
      `;
      grid.appendChild(div);
    });
  } catch(e) {
    grid.innerHTML = "<p>加载失败，请刷新重试</p>";
  }
}
loadCards();
</script>
</body>
</html>
