<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>060u导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#fff;padding-bottom:60px}
.top-bar{height:3px;background:linear-gradient(90deg,#4080ff,#6373ff);animation:load 2s infinite;margin:20px auto;width:40px;border-radius:2px}
@keyframes load{0%{transform:translateX(-30px)}100%{transform:translateX(30px)}}
.welcome-bar{display:flex;align-items:center;background:#f5f7fa;padding:10px 15px;margin:10px 15px;border-radius:20px}
.welcome-bar .text{color:#333;font-size:16px}
.invite-btn{display:flex;align-items:center;justify-content:flex-end;margin:15px}
.invite-btn .avatar{width:40px;height:40px;background:#425a70;border-radius:8px;position:relative}
.invite-btn .add{position:absolute;right:-5px;bottom:-5px;width:20px;height:20px;background:#4080ff;color:#fff;border-radius:50%;display:grid;place-items:center;font-size:14px}
.invite-btn .label{margin-left:8px;color:#333;font-size:14px}
.category-title{display:flex;align-items:center;margin:20px 15px 10px;font-size:18px;color:#333}
.category-title .icon{width:24px;height:24px;background:#4080ff;color:#fff;border-radius:4px;display:grid;place-items:center;margin-right:8px}
.category-title .more{margin-left:auto;color:#666;font-size:14px}
.game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 15px}
.game-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px;position:relative}
.game-card .official{position:absolute;top:0;right:0;background:#4080ff;color:#fff;font-size:10px;padding:2px 6px;border-bottom-left-radius:8px}
.game-card .icon{width:40px;height:40px;margin:0 auto 8px;display:block}
.game-card .name{text-align:center;font-size:16px;color:#333;margin-bottom:4px}
.game-card .desc{text-align:center;font-size:12px;color:#666;margin-bottom:10px}
.game-card .btn{display:block;width:100%;background:linear-gradient(90deg,#4080ff,#6373ff);color:#fff;text-align:center;padding:6px 0;border-radius:20px;font-size:14px;text-decoration:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:center;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;font-size:12px;color:#666}
.nav-item.active{color:#4080ff}
.nav-item .icon{width:24px;height:24px;margin-bottom:4px}
</style>
</head>
<body>

<div class="top-bar"></div>
<h1 style="text-align:center;font-size:20px;margin:10px 0">首页</h1>

<div class="welcome-bar">
<span class="speaker">🔊</span>
<span class="text">欢迎访问060u导航</span>
</div>

<div class="invite-btn">
<div class="avatar"><div class="add">+</div></div>
<span class="label">邀请</span>
</div>

<div class="category-title">
<div class="icon">♠</div>
<span>推荐游戏</span>
<div class="more">全部游戏</div>
</div>

<div class="game-grid" id="card-container">
</div>

<div class="category-title">
<div class="icon">★</div>
<span>特色功能</span>
</div>

<div class="bottom-nav">
<div class="nav-item active">
<div class="icon">🏠</div>
<span>首页</span>
</div>
</div>

<script>
let cards = [];

function render(){
  let html = "";
  cards.forEach((c,i)=>{
    html += `
<div class="game-card">
<div class="official">官方</div>
<img src="${c.img}" class="icon">
<div class="name">${c.name}</div>
<div class="desc">${c.desc}</div>
<a href="${c.url}" class="btn">进入</a>
</div>`;
  });
  document.getElementById("card-container").innerHTML = html;
}

// 从 data.json 读取数据（所有人都能看到）
fetch("./data.json?"+Math.random())
.then(res=>res.json())
.then(data=>{
  cards=data;
  render();
})
.catch(()=>{
  cards=[
    {name:"首页",desc:"主页",url:"https://060u.cc",img:"https://picsum.photos/40/40"},
    {name:"游戏",desc:"游戏中心",url:"#",img:"https://picsum.photos/40/40"},
    {name:"工具",desc:"实用工具",url:"#",img:"https://picsum.photos/40/40"},
    {name:"影视",desc:"视频",url:"#",img:"https://picsum.photos/40/40"},
    {name:"音乐",desc:"听歌",url:"#",img:"https://picsum.photos/40/40"},
    {name:"社区",desc:"交流",url:"#",img:"https://picsum.photos/40/40"}
  ];
  render();
})
</script>

</body>
</html>
